  --amber:#BA7517;--amber-bg:#FAEEDA;--amber-txt:#633806;

  --blue:#378ADD;--blue-bg:#0d2238;--blue-txt:#7ab8f0;

}
body{font-family:'Plus Jakarta Sans',sans-serif;font-size:13px;background:var(--bg);color:var(--txt);min-height:100vh}
body.si{font-family:'Noto Sans Sinhala',sans-serif}
body.si .mono{font-family:'DM Mono',monospace}
.app{max-width:920px;margin:0 auto;padding:12px}

<script>
// ====================== FULL FIXED & UPDATED SCRIPT ======================

let currentTheme = localStorage.getItem('shopTheme') || 'light';
let currentLang = localStorage.getItem('shopLang') || 'en';
let businesses = [];
let currentBizId = null;
let globalCurrency = localStorage.getItem('globalCurrency') || 'LKR'; // Only for home/portfolio
let expenses = {};
let incomeLog = [];
let opsLog = [];
let loans = [];
let aT = 'portfolio';
let googleToken = null;
let _tokenExpiry = 0;
let spreadsheetId = null;
let isDirty = false;

// Toast
function showToast(msg, type = 'success') {
  let toast = document.getElementById('sync-toast');
  if (!toast) {
    toast = document.createElement('div');
    toast.id = 'sync-toast';
    toast.style.cssText = `position:fixed;bottom:20px;right:20px;padding:12px 20px;border-radius:12px;font-size:13px;font-weight:500;box-shadow:0 4px 20px rgba(0,0,0,.2);z-index:9999;transition:all .3s;`;
    document.body.appendChild(toast);
  }
  toast.textContent = msg;
  toast.style.background = type === 'success' ? 'var(--green-bg)' : 'var(--red-bg)';
  toast.style.color = type === 'success' ? 'var(--green-txt)' : 'var(--red-txt)';
  toast.style.opacity = '1';
  setTimeout(() => { toast.style.opacity = '0'; }, 2800);
}

// Theme
function toggleTheme() {
  currentTheme = currentTheme === 'light' ? 'dark' : 'light';
  localStorage.setItem('shopTheme', currentTheme);
  document.body.classList.toggle('dark', currentTheme === 'dark');
  document.querySelectorAll('.theme-toggle-knob').forEach(k => k.textContent = currentTheme === 'light' ? '☀️' : '🌙');
}

function applyTheme() {
  document.body.classList.toggle('dark', currentTheme === 'dark');
  document.querySelectorAll('.theme-toggle-knob').forEach(k => k.textContent = currentTheme === 'light' ? '☀️' : '🌙');
}

// Global currency (only Portfolio/Home)
function changeGlobalCurrency(newCur) {
  globalCurrency = newCur;
  localStorage.setItem('globalCurrency', newCur);
  if (aT === 'portfolio') renderPortfolio();
  showToast(`Portfolio currency set to ${newCur}`, 'success');
}

// Per-source currency
function getBizCurrency(bizId) {
  const biz = businesses.find(b => b.id === bizId);
  return biz && biz.currency ? biz.currency : 'LKR';
}

function saveBiz() {
  const name = document.getElementById('m-name').value.trim();
  if (!name) {
    document.getElementById('m-msg').textContent = 'Please enter a name';
    return;
  }
  const currency = document.getElementById('m-currency').value;

  const newBiz = {
    id: currentEditingBizId || 'biz_' + Date.now(),
    name: name,
    icon: document.getElementById('m-icon').value || '🏪',
    color: selectedColor || '#E6F1FB',
    type: selectedIncomeType || 'business',
    currency: currency
  };

  if (currentEditingBizId) {
    const biz = businesses.find(b => b.id === currentEditingBizId);
    if (biz) Object.assign(biz, newBiz);
  } else {
    businesses.push(newBiz);
  }

  localStorage.setItem('smt_businesses', JSON.stringify(businesses));
  currentBizId = newBiz.id;
  markDirty();

  closeModal();
  renderBizDropdown();
  renderPortfolio();
  showToast(`Source saved with currency ${currency}`, 'success');
}

// Your original functions (sw, renderPortfolio, syncNow, markDirty, etc.) go here
// Paste all your previous script logic below this point...

// Init
window.addEventListener('load', () => {
  applyTheme();
  const savedBiz = localStorage.getItem('smt_businesses');
  if (savedBiz) businesses = JSON.parse(savedBiz);
  if (businesses.length === 0) {
    businesses = [{id:'biz1', name:'My Shop', icon:'🏪', color:'#E6F1FB', currency:'LKR'}];
  }
  currentBizId = localStorage.getItem('smt_currentBiz') || businesses[0].id;

  globalCurrency = localStorage.getItem('globalCurrency') || 'LKR';
  const curSelect = document.getElementById('cur');
  if (curSelect) curSelect.value = globalCurrency;

  initApp();
});

// Expose key functions
window.changeGlobalCurrency = changeGlobalCurrency;
window.saveBiz = saveBiz;
window.toggleTheme = toggleTheme;

// Keep all your original sync, chart, tab switching logic here...

</script>
